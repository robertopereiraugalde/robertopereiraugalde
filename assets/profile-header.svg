<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roberto Pereira Ugalde - Building a more intelligent world</title>
  <desc id="desc">A minimal dark profile banner with NOUS-inspired typography and a subtle intelligent systems grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05010F"/>
      <stop offset="0.48" stop-color="#160A42"/>
      <stop offset="1" stop-color="#06020D"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(815 214) rotate(90) scale(270 430)">
      <stop stop-color="#DCD4FF" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#9C8CFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#05010F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="228" y1="115" x2="1054" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#DCD4FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="32" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="32" fill="url(#glow)"/>
  <path d="M140 128C256 86 340 104 436 156C540 212 631 234 738 171C856 102 966 118 1140 198" stroke="url(#line)" stroke-width="1.5"/>
  <path d="M168 293C299 229 398 232 503 282C620 337 717 325 829 256C949 181 1049 195 1160 254" stroke="url(#line)" stroke-width="1"/>

  <g opacity="0.58">
    <circle cx="257" cy="112" r="4" fill="#DCD4FF"/>
    <circle cx="436" cy="156" r="3" fill="#FFFFFF"/>
    <circle cx="738" cy="171" r="4" fill="#DCD4FF"/>
    <circle cx="966" cy="118" r="3" fill="#FFFFFF"/>
    <circle cx="299" cy="229" r="3" fill="#FFFFFF"/>
    <circle cx="503" cy="282" r="4" fill="#DCD4FF"/>
    <circle cx="829" cy="256" r="3" fill="#FFFFFF"/>
    <circle cx="1049" cy="195" r="4" fill="#DCD4FF"/>
