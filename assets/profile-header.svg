    <text x="140" y="145" fill="#DCD4FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="4">FOUNDER &amp; CEO, NOUS</text>
    <text x="140" y="214" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="50" font-weight="760">Roberto Pereira Ugalde</text>
    <text x="140" y="267" fill="#F5F1FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="500">Building a more intelligent world.</text>
    <text x="140" y="306" fill="#CFC6EA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="450">AI transformation, intelligent systems, and practical automation for Costa Rica and LatAm.</text>
