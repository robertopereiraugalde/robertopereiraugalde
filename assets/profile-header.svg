<svg width="1280" height="500" viewBox="0 0 1280 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roberto Pereira Ugalde - Founder and CEO of NOUS</title>
  <desc id="desc">A refined executive profile banner for an AI company founder, with a dark NOUS-inspired field and an intelligence operating system motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05030A"/>
      <stop offset="0.34" stop-color="#12072D"/>
      <stop offset="0.68" stop-color="#1E0D4E"/>
      <stop offset="1" stop-color="#06020D"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 245) rotate(90) scale(280 420)">
      <stop offset="0" stop-color="#F5F1FF" stop-opacity="0.3"/>
      <stop offset="0.42" stop-color="#DCD4FF" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#05030A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="160" y1="110" x2="1115" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="0.5" stop-color="#DCD4FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="500" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="500" rx="34" fill="url(#core)"/>

  <g opacity="0.45">
    <path d="M138 178C228 126 325 112 430 165C539 220 610 269 724 206C846 139 957 122 1136 190" stroke="url(#stroke)" stroke-width="1.4"/>
    <path d="M142 318C264 245 367 246 477 307C594 372 706 344 823 265C945 184 1045 213 1148 282" stroke="url(#stroke)" stroke-width="1.1"/>
    <path d="M234 96V403M416 80V420M640 72V430M862 76V424M1046 98V400" stroke="#FFFFFF" stroke-opacity="0.045"/>
    <path d="M110 146H1170M110 252H1170M110 354H1170" stroke="#FFFFFF" stroke-opacity="0.05"/>
  </g>

  <g opacity="0.68">
    <circle cx="430" cy="165" r="4" fill="#FFFFFF"/>
    <circle cx="724" cy="206" r="5" fill="#DCD4FF"/>
    <circle cx="957" cy="122" r="3.5" fill="#FFFFFF"/>
    <circle cx="477" cy="307" r="4" fill="#DCD4FF"/>
    <circle cx="823" cy="265" r="4" fill="#FFFFFF"/>
    <circle cx="1045" cy="213" r="5" fill="#DCD4FF"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="82" y="74" width="1116" height="352" rx="30" fill="#080312" fill-opacity="0.78" stroke="#DCD4FF" stroke-opacity="0.2"/>
    <text x="128" y="136" fill="#DCD4FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="760" letter-spacing="4.6">FOUNDER &amp; CEO · NOUS</text>
    <text x="128" y="211" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="760">Roberto Pereira Ugalde</text>
    <text x="128" y="269" fill="#F5F1FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="540">Building a more intelligent world.</text>
    <text x="128" y="318" fill="#CBC2E9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="440">AI transformation as company design: strategy, systems, adoption, governance, and compounding intelligence.</text>

    <g transform="translate(128 356)">
      <rect width="182" height="34" rx="17" fill="#DCD4FF" fill-opacity="0.12" stroke="#DCD4FF" stroke-opacity="0.28"/>
      <text x="20" y="23" fill="#F5F1FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="650">Strategy into systems</text>
      <rect x="198" width="184" height="34" rx="17" fill="#DCD4FF" fill-opacity="0.12" stroke="#DCD4FF" stroke-opacity="0.28"/>
      <text x="218" y="23" fill="#F5F1FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="650">AI into operations</text>
      <rect x="398" width="184" height="34" rx="17" fill="#DCD4FF" fill-opacity="0.12" stroke="#DCD4FF" stroke-opacity="0.28"/>
      <text x="418" y="23" fill="#F5F1FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="650">Trust into adoption</text>
    </g>
  </g>
